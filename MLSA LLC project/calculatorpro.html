<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Pro</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        background: 
            url("https://play-lh.googleusercontent.com/rzgGZnzwmSGY59VSvdmqVazwfpYsKr0gChFmROVTJToeczJKTzw9YyP81YiCjtgOg8Q=w526-h296-rw") 
            no-repeat center center/cover;
    }

    .calculator {
        background: #1e293b;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 25px #00f2ff;
        width: 300px;
    }

    .display {
        width: 100%;
        height: 60px;
        background: #020617;
        border: none;
        border-radius: 10px;
        color: #00f2ff;
        font-size: 28px;
        text-align: right;
        padding: 10px;
        margin-bottom: 15px;
        box-shadow: inset 0 0 10px #00f2ff;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        height: 60px;
        border: none;
        border-radius: 12px;
        font-size: 20px;
        cursor: pointer;
        color: white;
        background: #334155;
        transition: 0.3s;
    }

    button:hover {
        background: #00f2ff;
        color: black;
        box-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff;
        transform: scale(1.05);
    }

    .operator {
        background: #f97316;
    }

    .operator:hover {
        box-shadow: 0 0 15px #f97316, 0 0 30px #f97316;
    }

    .equal {
        grid-column: span 2;
        background: #22c55e;
    }

    .equal:hover {
        box-shadow: 0 0 15px #22c55e, 0 0 30px #22c55e;
    }

    .clear {
        background: #ef4444;
    }

    .clear:hover {
        box-shadow: 0 0 15px #ef4444, 0 0 30px #ef4444;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
