<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Library Manager</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url('https://cdn.thespaces.com/wp-content/uploads/2019/08/Lansdowne-Crescent_The-Modern-House-2.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    min-height: 100vh;
}

.container {
    display: flex;
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
}

.sidebar {
    width: 300px;
    background: rgba(255, 255, 255, 0.9);
    padding: 2rem;
    backdrop-filter: blur(5px);
    height: 100vh;
    position: sticky;
    top: 0;
}

.main-content {
    flex-grow: 1;
    padding: 2rem;
}

.book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.book-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.status-btn {
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

.status-btn.is-read {
    background: #27ae60;
}

.delete-btn {
    background: #e74c3c;
    color: white;
    border: none;
    cursor: pointer;
}

.delete-btn:hover {
    background: #c0392b;
}
</style>
</head>

<body>

<div class="container">

    <aside class="sidebar">
        <h1>📚 My Library</h1>

        <form id="book-form">
            <input type="text" id="title" placeholder="Book Title" required>
            <input type="text" id="author" placeholder="Author" required>

            <select id="genre">
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Tech">Tech</option>
                <option value="Classic">Classic</option>
            </select>

            <button type="submit">Add Book</button>
        </form>

        <hr>

        <input type="text" id="search" placeholder="Search title or author...">

        <select id="filter-genre">
            <option value="All">All Genres</option>
            <option value="Fiction">Fiction</option>
            <option value="Non-Fiction">Non-Fiction</option>
            <option value="Tech">Tech</option>
            <option value="Classic">Classic</option>
        </select>

    </aside>

    <main class="main-content">
        <div id="book-grid" class="book-grid"></div>
    </main>

</div>

<script>
// Load from localStorage
let myLibrary = JSON.parse(localStorage.getItem('myBooks')) || [];

const bookForm = document.getElementById('book-form');
const bookGrid = document.getElementById('book-grid');
const searchInput = document.getElementById('search');
const filterGenre = document.getElementById('filter-genre');

// Add Book
bookForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const newBook = {
        id: Date.now(),
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        genre: document.getElementById('genre').value,
        isRead: false
    };

    myLibrary.push(newBook);
    saveAndRender();
    bookForm.reset();
});

// Delete Book
function deleteBook(id) {
    if (confirm("Are you sure you want to delete this book?")) {
        myLibrary = myLibrary.filter(book => book.id !== id);
        saveAndRender();
    }
}

// Toggle Read
function toggleRead(id) {
    myLibrary = myLibrary.map(book => {
        if (book.id === id) {
            return {...book, isRead: !book.isRead};
        }
        return book;
    });
    saveAndRender();
}

// Filter Books
function filterBooks() {
    const query = searchInput.value.toLowerCase();
    const selectedGenre = filterGenre.value;

    const filtered = myLibrary.filter(book => {
        const matchesSearch =
            book.title.toLowerCase().includes(query) ||
            book.author.toLowerCase().includes(query);

        const matchesGenre =
            selectedGenre === 'All' || book.genre === selectedGenre;

        return matchesSearch && matchesGenre;
    });

    render(filtered);
}

// Render
function render(books) {
    bookGrid.innerHTML = '';

    books.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';

        card.innerHTML = `
            <div>
                <h3>${book.title}</h3>
                <p><strong>Author:</strong> ${book.author}</p>
                <p><strong>Genre:</strong> ${book.genre}</p>
            </div>

            <div class="btn-group">
                <button class="status-btn ${book.isRead ? 'is-read' : ''}"
                    onclick="toggleRead(${book.id})">
                    ${book.isRead ? 'Read' : 'Unread'}
                </button>

                <button class="delete-btn"
                    onclick="deleteBook(${book.id})">
                    Delete
                </button>
            </div>
        `;

        bookGrid.appendChild(card);
    });
}

// Save + Render
function saveAndRender() {
    localStorage.setItem('myBooks', JSON.stringify(myLibrary));
    filterBooks();
}

// Events
searchInput.addEventListener('input', filterBooks);
filterGenre.addEventListener('change', filterBooks);

// Initial load
filterBooks();
</script>

</body>
</html>
